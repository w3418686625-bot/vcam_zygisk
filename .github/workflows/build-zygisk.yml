name: Build VCAM Zygisk Module

on:
  workflow_dispatch:
  push:
    paths:
      - 'zygisk_module/**'
      - '.github/workflows/build-zygisk.yml'
    branches:
      - main
      - master

jobs:
  build:
    name: Build Zygisk Module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Debug NDK environment
        run: |
          echo "=== Environment variables ==="
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo "ANDROID_NDK=$ANDROID_NDK"
          
          # Find NDK location
          for dir in "$ANDROID_NDK_HOME" "$ANDROID_NDK_ROOT" "$ANDROID_NDK" "$HOME/android-ndk-r26d" "/usr/local/lib/android/sdk/ndk/26.3.11579264"; do
            if [ -d "$dir" ]; then
              echo "Found NDK at: $dir"
              find "$dir" -name "aarch64-linux-android*-clang++" 2>/dev/null | head -5
            fi
          done
          
          # Try to find clang++ anywhere
          echo "=== Searching for clang++ ==="
          find / -name "aarch64-linux-android*clang++" 2>/dev/null | head -5
          find / -name "aarch64-linux-android*-clang++" -type f 2>/dev/null | head -5
          
          # Check NDK structure
          if [ -n "$ANDROID_NDK_HOME" ] && [ -d "$ANDROID_NDK_HOME" ]; then
            echo "=== NDK HOME contents ==="
            ls -la "$ANDROID_NDK_HOME/" 2>/dev/null
            echo "=== Toolchains ==="
            ls -la "$ANDROID_NDK_HOME/toolchains/" 2>/dev/null
          fi

      - name: Find compiler
        id: findcc
        run: |
          # Find the aarch64 compiler
          AARCH64_CC=$(find / -name "aarch64-linux-android*-clang++" -type f 2>/dev/null | head -1)
          ARMV7_CC=$(find / -name "armv7a-linux-androideabi*-clang++" -type f 2>/dev/null | head -1)
          
          if [ -z "$AARCH64_CC" ]; then
            echo "ERROR: Could not find aarch64 clang++ compiler"
            echo "Trying common paths..."
            for p in "$ANDROID_NDK_HOME" "$ANDROID_NDK_ROOT" "$ANDROID_NDK"; do
              if [ -d "$p/toolchains/llvm/prebuilt/linux-x86_64/bin" ]; then
                echo "Found toolchain at: $p/toolchains/llvm/prebuilt/linux-x86_64/bin"
                ls "$p/toolchains/llvm/prebuilt/linux-x86_64/bin/"*clang++ 2>/dev/null
                AARCH64_CC="$p/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang++"
                ARMV7_CC="$p/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi31-clang++"
              fi
            done
          fi
          
          echo "AARCH64_CC=$AARCH64_CC"
          echo "ARMV7_CC=$ARMV7_CC"
          
          if [ -z "$AARCH64_CC" ] || [ -z "$ARMV7_CC" ]; then
            echo "ERROR: Compilers not found!"
            exit 1
          fi
          
          echo "AARCH64_CC=$AARCH64_CC" >> $GITHUB_OUTPUT
          echo "ARMV7_CC=$ARMV7_CC" >> $GITHUB_OUTPUT

      - name: Create build directories
        run: |
          mkdir -p zygisk_module/zygisk/libs/arm64-v8a
          mkdir -p zygisk_module/zygisk/libs/armeabi-v7a

      - name: Build arm64-v8a
        run: |
          set -e
          AARCH64_CC="${{ steps.findcc.outputs.AARCH64_CC }}"
          echo "=== Building arm64-v8a with $AARCH64_CC ==="
          
          $AARCH64_CC \
            -std=c++17 -O2 -fPIC -shared \
            -fvisibility=hidden -fvisibility-inlines-hidden \
            -fno-exceptions -fno-rtti \
            -ffunction-sections -fdata-sections \
            -Izygisk_module/zygisk \
            zygisk_module/zygisk/main.cpp \
            -o zygisk_module/zygisk/libs/arm64-v8a/libvcam_zygisk.so \
            -llog -landroid -lnativewindow \
            -Wl,--gc-sections \
            -Wl,--hash-style=sysv \
            -Wl,--exclude-libs,ALL
          
          echo "=== Build result ==="
          ls -la zygisk_module/zygisk/libs/arm64-v8a/

      - name: Build armeabi-v7a
        run: |
          set -e
          ARMV7_CC="${{ steps.findcc.outputs.ARMV7_CC }}"
          echo "=== Building armeabi-v7a with $ARMV7_CC ==="
          
          $ARMV7_CC \
            -std=c++17 -O2 -fPIC -shared \
            -fvisibility=hidden -fvisibility-inlines-hidden \
            -fno-exceptions -fno-rtti \
            -ffunction-sections -fdata-sections \
            -Izygisk_module/zygisk \
            zygisk_module/zygisk/main.cpp \
            -o zygisk_module/zygisk/libs/armeabi-v7a/libvcam_zygisk.so \
            -llog -landroid \
            -Wl,--gc-sections \
            -Wl,--hash-style=sysv \
            -Wl,--exclude-libs,ALL
          
          echo "=== Build result ==="
          ls -la zygisk_module/zygisk/libs/armeabi-v7a/

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Package Zygisk module
        run: |
          echo "=== Packaging Zygisk module ==="
          cd zygisk_module
          
          mkdir -p zygisk_out/zygisk
          
          cp module.prop zygisk_out/
          cp customize.sh zygisk_out/
          cp post-fs-data.sh zygisk_out/
          cp service.sh zygisk_out/
          cp zygisk/libs/arm64-v8a/libvcam_zygisk.so zygisk_out/zygisk/arm64-v8a.so
          cp zygisk/libs/armeabi-v7a/libvcam_zygisk.so zygisk_out/zygisk/armeabi-v7a.so
          
          chmod 755 zygisk_out/customize.sh
          chmod 755 zygisk_out/post-fs-data.sh
          chmod 755 zygisk_out/service.sh
          chmod 644 zygisk_out/module.prop
          chmod 644 zygisk_out/zygisk/*.so
          
          cd zygisk_out
          zip -r ../vcam_zygisk.zip .
          cd ..
          
          ls -la vcam_zygisk.zip
          unzip -l vcam_zygisk.zip
          echo "=== Module packaged successfully ==="

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcam_zygisk_module
          path: zygisk_module/vcam_zygisk.zip
          retention-days: 90
